<svg viewBox="0 0 850 300" xmlns="http://www.w3.org/2000/svg">
    <!-- Embed a free commercial web font (Inter or Montserrat/Roboto fallback) -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
        .brand-text {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
    </style>
    <defs>
        <polygon id="shardTop" points="100,80 220,150 180,150 135,124" />
        <polygon id="shardLeft" points="100,80 100,220 135,176 135,124" />
        <polygon id="shardBottom" points="100,220 220,150 180,150 135,176" />
        <mask id="maskTop">
            <rect width="100%" height="100%" fill="white" />
            <use href="#shardLeft" stroke="black" stroke-width="26" stroke-linejoin="round" fill="none" />
        </mask>
        <mask id="maskLeft">
            <rect width="100%" height="100%" fill="white" />
            <use href="#shardBottom" stroke="black" stroke-width="26" stroke-linejoin="round" fill="none" />
        </mask>
        <mask id="maskBottom">
            <rect width="100%" height="100%" fill="white" />
            <use href="#shardTop" stroke="black" stroke-width="26" stroke-linejoin="round" fill="none" />
        </mask>
    </defs>

    <g transform="translate(10, 0)">
        <use href="#shardTop" fill="#0055FF" stroke="#0055FF" stroke-width="14" stroke-linejoin="round" mask="url(#maskTop)" />
        <use href="#shardLeft" fill="#0055FF" stroke="#0055FF" stroke-width="14" stroke-linejoin="round" mask="url(#maskLeft)" />
        <use href="#shardBottom" fill="#0055FF" stroke="#0055FF" stroke-width="14" stroke-linejoin="round" mask="url(#maskBottom)" />
    </g>

    <g transform="translate(280, 160)" class="brand-text">
        <text x="0" y="0" font-size="64" fill="#0B1B3D">
            <tspan font-weight="800">Lumen</tspan>
            <tspan font-weight="400" fill="#0055FF">Stream</tspan>
        </text>
        <text x="5" y="40" font-size="16" font-weight="600" fill="#64748B" letter-spacing="4.5">
            OPEN SOURCE STREAMING PROJECT
        </text>
    </g>
</svg>
