server {
    listen 4321;
    root /usr/share/nginx/html;
    absolute_redirect off;

    # 静态资源长缓存
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # runtime-config 不缓存
    location = /runtime-config.js {
        add_header Cache-Control "no-store";
    }

    # 动态路由 SPA fallback
    location /app/item/ {
        try_files $uri /app/item/index.html;
    }
    location /app/library/ {
        try_files $uri /app/library/index.html;
    }
    location /app/person/ {
        try_files $uri /app/person/index.html;
    }

    # 其余静态文件
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
