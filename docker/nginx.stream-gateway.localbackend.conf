upstream lumenstream_api {
    server meilisearch:8096;
}

upstream lumenlocalbackend_local {
    server lumenlocalbackend:18081;
}

server {
    listen 8096;
    absolute_redirect off;

    client_max_body_size 0;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    proxy_buffering off;

    location = /v1/streams/local {
        proxy_pass http://lumenlocalbackend_local;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://lumenstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
